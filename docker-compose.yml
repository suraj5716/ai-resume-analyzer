version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: resumeai
      POSTGRES_USER: resumeai
      POSTGRES_PASSWORD: resumeai_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DJANGO_SECRET_KEY: change-this-in-production
      DJANGO_DEBUG: "False"
      DATABASE_URL: postgres://resumeai:resumeai_pass@db:5432/resumeai
      DJANGO_ALLOWED_HOSTS: localhost,api.resumeai.com
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
  media_volume:
