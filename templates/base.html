<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CV Insight — Check how well your resume matches a job description. Get an ATS score, find missing keywords, and see what to improve.">
    <title>CV Insight — Resume & ATS Checker</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Background -->
    <div class="bg-gradient">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
        <div class="bg-orb bg-orb-4"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar" id="main-nav">
        <div class="nav-brand">
            <span class="nav-icon">📑</span>
            <span class="nav-title">CV Insight</span>
            <span class="nav-badge">ATS Checker</span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link active">Analyze</a>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>Built with <span class="heart"></span> using Flask, spaCy & scikit-learn</p>
            <p class="footer-sub">Your resume is processed locally — nothing gets stored</p>
        </div>
    </footer>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
